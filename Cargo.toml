[package]
name = "hilan"
version = "0.3.0"
edition = "2021"
rust-version = "1.80"
description = "CLI for Hilan attendance reporting and payslip retrieval"
license = "MIT"
repository = "https://github.com/avivsinai/hilan"
authors = ["Aviv Sinai <avivsinai@users.noreply.github.com>"]
keywords = ["hilan", "hilanet", "attendance", "hr", "cli"]
categories = ["command-line-utilities"]

[lib]
name = "hilan"
path = "src/lib.rs"

[[bin]]
name = "hilan"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls", "cookies"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1"
anyhow = "1"
regex = "1"
scraper = "0.22"
directories = "6"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
