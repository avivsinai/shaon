name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Codesign macOS binary
        if: runner.os == 'macOS'
        run: codesign --force --sign - --identifier io.github.avivsinai.hilan target/${{ matrix.target }}/release/hilan

      - name: Package binary
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/hilan
          ARCHIVE=hilan-${{ matrix.target }}.tar.gz
          tar czf "$ARCHIVE" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: hilan-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: |
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt

  update-homebrew:
    name: Update Homebrew Formula
    needs: [build, release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Update tap formula
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is not configured; skipping tap update."
            exit 0
          fi

          VERSION="${TAG#v}"
          SHA_ARM_MAC="$(sha256sum artifacts/hilan-aarch64-apple-darwin.tar.gz | awk '{print $1}')"
          SHA_X86_MAC="$(sha256sum artifacts/hilan-x86_64-apple-darwin.tar.gz | awk '{print $1}')"
          SHA_X86_LINUX="$(sha256sum artifacts/hilan-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')"

          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/avivsinai/homebrew-tap.git" tap

          cat > tap/Formula/hilan.rb <<RUBY
          # typed: false
          # frozen_string_literal: true

          class Hilan < Formula
            desc "Automate Hilanet attendance, payslips, salary, and reports"
            homepage "https://github.com/avivsinai/hilan"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/avivsinai/hilan/releases/download/${TAG}/hilan-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_MAC}"
              end
              if Hardware::CPU.arm?
                url "https://github.com/avivsinai/hilan/releases/download/${TAG}/hilan-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM_MAC}"
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/avivsinai/hilan/releases/download/${TAG}/hilan-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_LINUX}"
              end
            end

            def install
              bin.install "hilan"
              generate_completions_from_executable(bin/"hilan", "completions")
            end

            test do
              system "#{bin}/hilan", "--version"
            end
          end
          RUBY

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hilan.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git commit -m "hilan ${TAG}"
          git push
