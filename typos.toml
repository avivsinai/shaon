[default.extend-words]
# Hebrew transliterations and domain-specific terms
shaon = "shaon"
orgid = "orgid"
aspx = "aspx"
asmx = "asmx"
# Variable name for <th> elements in HTML parsing
ths = "ths"
# Hilan uses these misspellings in CSS classes and control IDs.
Abcense = "Abcense"
Updator = "Updator"

[files]
extend-exclude = [
    "Cargo.lock",
    "target/",
    "tests/fixtures/",
    "**/tests/fixtures/",
    ".claude/",
    ".agent-mail/",
]
